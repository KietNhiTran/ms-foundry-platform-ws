# GitHub Actions workflow for automated agent evaluation
# Triggers on PRs to main that modify agent source or policies
# Uses the Contoso-Eval-SP service principal (see modules/07-evaluation/src/setup_eval_sp.ps1)

name: Agent Evaluation Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "modules/02-build-your-first-agent/**"
      - "modules/07-evaluation/**"

  workflow_dispatch:
    inputs:
      dataset:
        description: "Evaluation dataset path (relative to repo root)"
        required: false
        default: "modules/07-evaluation/data/contoso-estimator-eval-ci.json"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  evaluate-agent:
    name: Run Agent Evaluation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
          allow-no-subscriptions: true

      - name: Run Agent Evaluation
        uses: microsoft/ai-agent-evals@v3-beta
        id: eval
        with:
          azure-ai-project-endpoint: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}
          deployment-name: gpt-5.4
          data-path: modules/07-evaluation/data/contoso-estimator-eval-ci.json
          agent-name: "contoso-estimation-advisor"

      
